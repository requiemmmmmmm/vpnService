services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vpn
      POSTGRES_PASSWORD: vpn
      POSTGRES_DB: vpn
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpn"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: .
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8080
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    privileged: true
    network_mode: host

  bot:
    build: .
    command: python -m bot.main
    env_file: .env
    network_mode: host
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
